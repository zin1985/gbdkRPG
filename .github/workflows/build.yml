name: Build Game Boy ROM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Build with GBDK Action Builder
        uses: wujood/gbdk-2020-github-builder@1.0.8
        with:
          subdirectory: ./
          source: main.c
          output-name: gbdkRPG

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: gbdkRPG-rom
          path: |
            ./*.gb
            ./**/*.gb
